<!doctype html>
<!--
  design-builder output, ROUND 1 (pre-review).
  Visual decisions from design-lead: a calm mint-tinted success toast, muted
  secondary label for the "Undo" affordance. Looks gentle. Whether it's legible is
  NOT a matter of opinion — the accessibility critic measures it next.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Save for later — toast (v1)</title>
  <style>
    :root {
      --toast-surface: #e8f3ee;   /* mint-tinted success surface */
      --toast-title:   #1f3d2f;   /* dark green title */
      --toast-undo:    #8aa79a;   /* muted green "Undo" — the suspced weak one */
    }
    body { font: 16px/1.5 system-ui, sans-serif; background:#fff; padding:2rem; }
    .toast {
      display:flex; align-items:center; gap:.75rem;
      background:var(--toast-surface);
      border-radius:12px; padding:.875rem 1.125rem; max-width:24rem;
      box-shadow:0 2px 10px rgba(0,0,0,.08);
    }
    .toast__msg   { color:var(--toast-title); font-weight:600; }
    .toast__undo  { color:var(--toast-undo); margin-left:auto;
                    background:none; border:0; font:inherit; cursor:pointer; }
  </style>
</head>
<body>
  <div class="toast" role="status" aria-live="polite">
    <span class="toast__msg">Saved to your reading list</span>
    <button class="toast__undo">Undo</button>
  </div>
</body>
</html>
